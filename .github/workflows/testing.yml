name: testing

on:
  push:
    branches: [ main, dev, multi-platform ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * *"

jobs:
  # Unit tests run everywhere: the tool is now pure Python (only `requests`), so the
  # suite must pass on Linux, macOS and Windows. This also exercises the `spawn`
  # multiprocessing start method used on Windows/macOS (FunctionJob picklability).
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install SeqDD
        run: python -m pip install .[dev]
      - name: Unit tests and code coverage
        run: |
          coverage run --source=seqdd
          coverage report

  # Functional tests drive the real CLI with bash scripts and hit live servers
  # (ENA/EBI, S3, NCBI FTP). They run on the POSIX runners only.
  functional-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check FTP file availability
        run: |
          set -e
          curl --fail --silent --range 0-0 ftp://ftp.ncbi.nlm.nih.gov/genomes/ASSEMBLY_REPORTS/assembly_summary_refseq.txt -o /dev/null
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install SeqDD
        run: python -m pip install .[dev]
      - name: Functional tests
        run: |
          chmod +x tests/functional/main.sh
          ./tests/functional/main.sh
