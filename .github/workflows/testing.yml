name: testing

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check FTP file availability
        run: |
          set -e
          curl --fail --silent --range 0-0 ftp://ftp.ncbi.nlm.nih.gov/genomes/ASSEMBLY_REPORTS/assembly_summary_refseq.txt -o /dev/null
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install SeqDD
        run: python -m pip install .[dev]
      - name: Test and Compute the code coverage
        run: coverage run --source=seqdd
        if: matrix.python-version == '3.12'
      - name: functional tests
        run: |
          chmod +x tests/functional/main.sh
          ./tests/functional/main.sh
